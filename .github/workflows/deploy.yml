name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time; cancel in-progress if a newer commit is pushed
concurrency:
  group: deploy-production
  cancel-in-progress: false  # don't cancel in-progress deploys, queue instead

permissions:
  id-token: write   # required for OIDC token
  contents: read

env:
  AWS_REGION: us-east-2

jobs:
  # ----------------------------------------------------------------
  # 1. Deploy backend infrastructure (CDK)
  # ----------------------------------------------------------------
  deploy-infrastructure:
    name: Deploy infrastructure (CDK)
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.get-outputs.outputs.api_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install infrastructure dependencies
        run: npm ci
        working-directory: infrastructure

      - name: Install backend dependencies (for CDK bundling)
        run: npm ci
        working-directory: backend

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy all stacks
        run: |
          npx cdk deploy \
            TripTallyNetworkStack \
            TripTallyDynamoStack \
            TripTallyStorageStack \
            TripTallyApiStack \
            TripTallyFrontendStack \
            --require-approval never \
            --outputs-file cdk-outputs.json
        working-directory: infrastructure
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          GITHUB_REPO: ${{ secrets.APP_GITHUB_REPO }}
          GITHUB_TOKEN_SECRET: ${{ secrets.APP_GITHUB_TOKEN_SECRET }}

      - name: Extract CDK outputs
        id: get-outputs
        run: |
          API_URL=$(jq -r '.TripTallyApiStack.ApiUrl' infrastructure/cdk-outputs.json)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Upload CDK outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk-outputs.json
          retention-days: 7
