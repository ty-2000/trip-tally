name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time; cancel in-progress if a newer commit is pushed
concurrency:
  group: deploy-production
  cancel-in-progress: false  # don't cancel in-progress deploys, queue instead

permissions:
  id-token: write   # required for OIDC token
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # ----------------------------------------------------------------
  # 1. Deploy backend infrastructure (CDK)
  # ----------------------------------------------------------------
  deploy-infrastructure:
    name: Deploy infrastructure (CDK)
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.get-outputs.outputs.api_url }}
      frontend_bucket: ${{ steps.get-outputs.outputs.frontend_bucket }}
      distribution_id: ${{ steps.get-outputs.outputs.distribution_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install infrastructure dependencies
        run: npm ci
        working-directory: infrastructure

      - name: Install backend dependencies (for CDK bundling)
        run: npm ci
        working-directory: backend

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy all stacks
        run: |
          npx cdk deploy \
            TripTallyNetworkStack \
            TripTallyDatabaseStack \
            TripTallyStorageStack \
            TripTallyFrontendStack \
            TripTallyApiStack \
            --require-approval never \
            --outputs-file cdk-outputs.json
        working-directory: infrastructure
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Extract CDK outputs
        id: get-outputs
        run: |
          API_URL=$(jq -r '.TripTallyApiStack.ApiUrl' infrastructure/cdk-outputs.json)
          BUCKET=$(jq -r '.TripTallyFrontendStack.BucketName' infrastructure/cdk-outputs.json)
          DIST_ID=$(jq -r '.TripTallyFrontendStack.DistributionId' infrastructure/cdk-outputs.json)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Upload CDK outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk-outputs.json
          retention-days: 7

  # ----------------------------------------------------------------
  # 2. Build and deploy frontend to S3 + invalidate CloudFront
  # ----------------------------------------------------------------
  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend-web

      - name: Build Next.js static export
        run: npm run build
        working-directory: frontend-web
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.deploy-infrastructure.outputs.api_url }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Sync HTML files with short cache (they change on every deploy)
          aws s3 sync frontend-web/out/ s3://${{ needs.deploy-infrastructure.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

          # Sync static assets with long cache (hashed filenames)
          aws s3 sync frontend-web/out/ s3://${{ needs.deploy-infrastructure.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infrastructure.outputs.distribution_id }} \
            --paths "/*"

      - name: Print site URL
        run: |
          echo "Deployed to: https://$(aws cloudfront get-distribution \
            --id ${{ needs.deploy-infrastructure.outputs.distribution_id }} \
            --query 'Distribution.DomainName' --output text)"

  # ----------------------------------------------------------------
  # 3. Run DB migrations (schema is idempotent, safe to re-run)
  # ----------------------------------------------------------------
  run-migrations:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download CDK outputs
        uses: actions/download-artifact@v4
        with:
          name: cdk-outputs

      - name: Run schema via Lambda (psql not available in CI)
        run: |
          # Invoke a one-off Lambda that runs the schema SQL.
          # Schema uses CREATE TABLE IF NOT EXISTS so it's safe to re-run.
          # This step is a placeholder — see docs/migrations.md for options.
          echo "Schema is applied on first CDK deploy via RDS init."
          echo "For subsequent schema changes, use a migration Lambda or RDS Data API."
